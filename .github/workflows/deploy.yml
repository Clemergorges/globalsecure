name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:password@localhost:5432/globalsecure_test
      DIRECT_URL: postgresql://postgres:password@localhost:5432/globalsecure_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      OTP_PEPPER: ${{ secrets.OTP_PEPPER }}
      SENSITIVE_OTP_PEPPER: ${{ secrets.SENSITIVE_OTP_PEPPER }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_APP_URL: https://globalsecuresend.com
      STRIPE_SECRET_KEY: sk_test_mock
      STRIPE_WEBHOOK_SECRET: whsec_mock
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_mock
      TWILIO_ACCOUNT_SID: ACmock
      TWILIO_AUTH_TOKEN: mock
      TWILIO_PHONE_NUMBER: +15005550006
      REDIS_URL: redis://mock:6379

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: globalsecure_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env.test
        run: |
          echo "NODE_ENV=test" > .env.test
          echo "DATABASE_URL=${{ env.DATABASE_URL }}" >> .env.test
          echo "DIRECT_URL=${{ env.DIRECT_URL }}" >> .env.test
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.test
          echo "OTP_PEPPER=${{ secrets.OTP_PEPPER }}" >> .env.test
          echo "SENSITIVE_OTP_PEPPER=${{ secrets.SENSITIVE_OTP_PEPPER }}" >> .env.test
          echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> .env.test
          echo "NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}" >> .env.test
          echo "STRIPE_SECRET_KEY=${{ env.STRIPE_SECRET_KEY }}" >> .env.test
          echo "STRIPE_WEBHOOK_SECRET=${{ env.STRIPE_WEBHOOK_SECRET }}" >> .env.test
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" >> .env.test
          echo "TWILIO_ACCOUNT_SID=${{ env.TWILIO_ACCOUNT_SID }}" >> .env.test
          echo "TWILIO_AUTH_TOKEN=${{ env.TWILIO_AUTH_TOKEN }}" >> .env.test
          echo "TWILIO_PHONE_NUMBER=${{ env.TWILIO_PHONE_NUMBER }}" >> .env.test
          echo "REDIS_URL=${{ env.REDIS_URL }}" >> .env.test

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Setup Test Database
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Run tests
        run: npm run test:ci # Bloqueia deploy se testes falharem (Segurança Sênior)
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Build application
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deploy automático concluído!"
          echo "🌐 URL: https://globalsecuresend.com"
          echo "📊 Status: $(date)"

      - name: Health check
        if: success()
        run: |
          sleep 30
          curl -f https://globalsecuresend.com/api/health || exit 1
